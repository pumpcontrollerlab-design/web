<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Irrigation Pro - Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        h1, h2, h3 { color: #2c3e50; text-align: center; }
        
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Status Indicators */
        .status-row { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 10px; }
        .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; background: #ccc; }
        .dot-on { background: #27ae60; box-shadow: 0 0 8px #27ae60; }
        
        /* Buttons */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-irr { background: #3498db; color: white; }
        .btn-fert { background: #9b59b6; color: white; }
        .btn-off { background: #bdc3c7; color: #333; }
        .btn-active { box-shadow: inset 0 0 0 3px #2c3e50; filter: brightness(1.1); }
        .btn-danger { background: #e74c3c; color: white; width: 100%; padding: 15px; font-size: 18px; margin-top: 10px; }
        
        /* Schedule Table */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: #ecf0f1; }
        input[type="number"] { width: 60px; padding: 5px; text-align: center; }
        select { padding: 5px; }
        
        /* Time & Days */
        .schedule-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .days-group label { margin-right: 8px; font-size: 14px; }
        .save-btn { background: #2ecc71; color: white; font-size: 16px; padding: 10px 20px; }
        
        .heartbeat { text-align: center; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 Smart Irrigation Pro</h1>
    <div class="heartbeat" id="heartbeat-display">ESP32 Status: Checking...</div>

    <div class="card">
        <h2>Live System Status</h2>
        <div class="status-row">
            <div><span class="status-dot" id="dot-main-pump"></span> Main Pump</div>
            <div><span class="status-dot" id="dot-fert-pump"></span> Fert Pump</div>
        </div>
    </div>

    <div class="card">
        <h2>Manual Control</h2>
        
        <h3>Irrigation Zones</h3>
        <div class="grid">
            <button class="btn-irr" id="btn-irr-1" onclick="setManualIrr(1)">Zone 1</button>
            <button class="btn-irr" id="btn-irr-2" onclick="setManualIrr(2)">Zone 2</button>
            <button class="btn-irr" id="btn-irr-3" onclick="setManualIrr(3)">Zone 3</button>
            <button class="btn-irr" id="btn-irr-4" onclick="setManualIrr(4)">Zone 4</button>
            <button class="btn-irr" id="btn-irr-5" onclick="setManualIrr(5)">Zone 5</button>
            <button class="btn-irr" id="btn-irr-6" onclick="setManualIrr(6)">Zone 6</button>
            <button class="btn-off" onclick="setManualIrr(0)">Turn All OFF</button>
        </div>

        <h3>Fertilizer Compartments</h3>
        <div class="grid">
            <button class="btn-fert" id="btn-fert-1" onclick="setManualFert(1)">Comp 1</button>
            <button class="btn-fert" id="btn-fert-2" onclick="setManualFert(2)">Comp 2</button>
            <button class="btn-fert" id="btn-fert-3" onclick="setManualFert(3)">Comp 3</button>
            <button class="btn-fert" id="btn-fert-4" onclick="setManualFert(4)">Comp 4</button>
            <button class="btn-off" onclick="setManualFert(0)">Turn All OFF</button>
        </div>

        <button class="btn-danger" onclick="triggerEmergencyStop()">🚨 EMERGENCY STOP 🚨</button>
    </div>

    <div class="card">
        <h2>Master Schedule Configuration</h2>
        
        <div class="schedule-header">
            <div>
                <label><b>Enable Schedule:</b> <input type="checkbox" id="sched-active"></label>
            </div>
            <div>
                <b>Start Time: </b> 
                <input type="number" id="sched-hour" min="0" max="23" placeholder="HH"> : 
                <input type="number" id="sched-minute" min="0" max="59" placeholder="MM">
            </div>
        </div>

        <div class="days-group">
            <b>Days:</b>
            <label><input type="checkbox" class="day-cb" value="1"> Sun</label>
            <label><input type="checkbox" class="day-cb" value="2"> Mon</label>
            <label><input type="checkbox" class="day-cb" value="4"> Tue</label>
            <label><input type="checkbox" class="day-cb" value="8"> Wed</label>
            <label><input type="checkbox" class="day-cb" value="16"> Thu</label>
            <label><input type="checkbox" class="day-cb" value="32"> Fri</label>
            <label><input type="checkbox" class="day-cb" value="64"> Sat</label>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Zone</th>
                    <th>Water (Mins)</th>
                    <th>Fertilizer (Mins)</th>
                    <th>Fertilizer Source</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                </tbody>
        </table>

        <div style="text-align: right; margin-top: 15px;">
            <button class="save-btn" onclick="saveSchedule()">💾 Save Master Schedule</button>
        </div>
    </div>
</div>

<script>
    // 1. Firebase Configuration (Already securely matched to your ESP32)
    const firebaseConfig = {
        apiKey: "AIzaSyAbfqRl4T3cv6cjZz9wT9J9cOjOenp-UJY",
        databaseURL: "https://smart-irrigation-c039f-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Generate Schedule Table Rows
    const tbody = document.getElementById('schedule-body');
    for(let i=0; i<6; i++) {
        tbody.innerHTML += `
            <tr>
                <td><b>Zone ${i+1}</b></td>
                <td><input type="number" id="irrDur-${i}" min="0" value="0"></td>
                <td><input type="number" id="fertDur-${i}" min="0" value="0"></td>
                <td>
                    <select id="fertZone-${i}">
                        <option value="0">None</option>
                        <option value="1">Comp 1</option>
                        <option value="2">Comp 2</option>
                        <option value="3">Comp 3</option>
                        <option value="4">Comp 4</option>
                    </select>
                </td>
            </tr>
        `;
    }

    // --- WRITE FUNCTIONS ---

    function setManualIrr(zoneNum) {
        db.ref('system/manualIrrZone').set(zoneNum);
    }

    function setManualFert(zoneNum) {
        db.ref('system/manualFertZone').set(zoneNum);
    }

    function triggerEmergencyStop() {
        if(confirm("Are you sure you want to stop all pumps and clear manual overrides?")) {
            db.ref('system/emergencyStop').set(true);
        }
    }

    function saveSchedule() {
        let daysMask = 0;
        document.querySelectorAll('.day-cb').forEach(cb => {
            if(cb.checked) daysMask += parseInt(cb.value);
        });

        let scheduleData = {
            active: document.getElementById('sched-active').checked,
            hour: parseInt(document.getElementById('sched-hour').value) || 0,
            minute: parseInt(document.getElementById('sched-minute').value) || 0,
            days: daysMask,
            irrDur: [],
            fertDur: [],
            fertZone: []
        };

        for(let i=0; i<6; i++) {
            scheduleData.irrDur.push(parseInt(document.getElementById(`irrDur-${i}`).value) || 0);
            scheduleData.fertDur.push(parseInt(document.getElementById(`fertDur-${i}`).value) || 0);
            scheduleData.fertZone.push(parseInt(document.getElementById(`fertZone-${i}`).value) || 0);
        }

        db.ref('schedule').set(scheduleData).then(() => {
            alert("Master Schedule Saved Successfully!");
        }).catch((error) => {
            alert("Error saving: " + error);
        });
    }

    // --- READ FUNCTIONS (Live Updates) ---

    // Listen to System Status
    db.ref('system').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        
        // Manual Irrigation Buttons
        for(let i=1; i<=6; i++) {
            let btn = document.getElementById(`btn-irr-${i}`);
            if (data.manualIrrZone === i) {
                btn.style.filter = "brightness(0.7)";
                btn.innerText = `Zone ${i} (ON)`;
            } else {
                btn.style.filter = "brightness(1)";
                btn.innerText = `Zone ${i}`;
            }
        }

        // Manual Fert Buttons
        for(let i=1; i<=4; i++) {
            let btn = document.getElementById(`btn-fert-${i}`);
            if (data.manualFertZone === i) {
                btn.style.filter = "brightness(0.7)";
                btn.innerText = `Comp ${i} (ON)`;
            } else {
                btn.style.filter = "brightness(1)";
                btn.innerText = `Comp ${i}`;
            }
        }

        // Pump Dots
        document.getElementById('dot-main-pump').className = data.pump1Active ? "status-dot dot-on" : "status-dot";
        document.getElementById('dot-fert-pump').className = data.fertPumpActive ? "status-dot dot-on" : "status-dot";

        // Heartbeat logic
        let now = Math.floor(Date.now() / 1000);
        let diff = now - (data.heartbeat || 0);
        if (diff < 15) {
            document.getElementById('heartbeat-display').innerHTML = "🟢 ESP32 is Online & Connected";
            document.getElementById('heartbeat-display').style.color = "#27ae60";
        } else {
            document.getElementById('heartbeat-display').innerHTML = "🔴 ESP32 is Offline (Last seen " + diff + " seconds ago)";
            document.getElementById('heartbeat-display').style.color = "#e74c3c";
        }
    });

    // Load Schedule Data into UI exactly once on page load
    db.ref('schedule').once('value', (snapshot) => {
        const sched = snapshot.val();
        if(!sched) return;

        document.getElementById('sched-active').checked = sched.active || false;
        document.getElementById('sched-hour').value = sched.hour || 0;
        document.getElementById('sched-minute').value = sched.minute || 0;

        document.querySelectorAll('.day-cb').forEach(cb => {
            let val = parseInt(cb.value);
            cb.checked = (sched.days & val) === val;
        });

        for(let i=0; i<6; i++) {
            if(sched.irrDur) document.getElementById(`irrDur-${i}`).value = sched.irrDur[i] || 0;
            if(sched.fertDur) document.getElementById(`fertDur-${i}`).value = sched.fertDur[i] || 0;
            if(sched.fertZone) document.getElementById(`fertZone-${i}`).value = sched.fertZone[i] || 0;
        }
    });

    // Check heartbeat continuously
    setInterval(() => {
        db.ref('system/heartbeat').once('value').then((snapshot) => {
             let now = Math.floor(Date.now() / 1000);
             let diff = now - (snapshot.val() || 0);
             if(diff >= 15) {
                 document.getElementById('heartbeat-display').innerHTML = "🔴 ESP32 is Offline (No heartbeat)";
                 document.getElementById('heartbeat-display').style.color = "#e74c3c";
             }
        });
    }, 5000);

</script>
</body>
</html>
