<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Irrigation System</title>
    <style>
        :root {
            --primary: #0ea5e9; --primary-dark: #0284c7;
            --success: #22c55e; --danger: #ef4444;
            --bg-color: #f8fafc; --card-bg: #ffffff;
            --text-main: #334155; --text-light: #64748b; --border: #e2e8f0;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; }
        
        .hidden { display: none !important; }
        
        /* Header & Nav */
        .header { text-align: center; padding: 10px 0 20px 0; margin-bottom: 20px; position: relative; }
        .header h1 { color: var(--primary-dark); margin: 0; font-size: 28px; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; transition: background 0.2s; box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3); margin-top: 10px; }
        .nav-btn:hover { background: var(--primary-dark); }
        .back-btn { position: absolute; left: 0; top: 15px; background: none; border: none; color: var(--primary); font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* Dashboard Cards */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .info-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
        .info-title { font-size: 14px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .info-value { font-size: 20px; font-weight: bold; }
        
        /* Status Dot */
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; transition: all 0.3s; }
        .online { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        .offline { background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }
        
        /* Visual Active Zone Monitor */
        .status-bar-container { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .status-bar-title { font-weight: bold; margin-bottom: 15px; font-size: 14px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px;}
        .status-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 5px; }
        .zone-indicator { background: #cbd5e1; color: white; text-align: center; padding: 10px 0; border-radius: 6px; font-size: 12px; font-weight: bold; transition: all 0.3s; }
        .zone-indicator.running { background: var(--success); box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); transform: scale(1.05); }

        /* Interactive Manual Zone Buttons */
        .zone-bar-container { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; }
        .zone-bar-title { font-weight: bold; margin-bottom: 15px; font-size: 16px; display: flex; justify-content: space-between;}
        .zone-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .zone-btn { background: var(--bg-color); color: var(--text-main); border: 2px solid var(--border); text-align: center; padding: 15px 0; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .zone-btn:hover { border-color: var(--primary); }
        .zone-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 12px rgba(14, 165, 233, 0.4); }

        /* Scheduling Section */
        .section-title { font-size: 22px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .action-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .cancel-btn { background: var(--text-light); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;}
        
        /* Dynamic Schedule Form */
        .schedule-form-card { background: #f0f9ff; padding: 20px; border-radius: 12px; border: 2px dashed var(--primary); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 5px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        .save-btn { width: 100%; background: var(--success); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Saved Schedule List */
        .saved-schedule-card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); border-left: 5px solid var(--primary); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .schedule-details { display: flex; flex-direction: column; gap: 5px; }
        .schedule-zone { font-weight: bold; font-size: 16px; color: var(--primary-dark); }
        .schedule-time { font-size: 14px; color: var(--text-main); }
        .delete-btn { background: #fee2e2; color: var(--danger); border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) {
            .zone-grid { grid-template-columns: repeat(3, 1fr); }
            .status-grid { grid-template-columns: repeat(6, 1fr); gap: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="dashboard-page">
        <div class="header">
            <h1>💧 SMART Irrigation</h1>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="info-title">Serial Number</div>
                <div class="info-value">SYS-ESP32-901X</div>
            </div>
            <div class="info-card">
                <div class="info-title">System Status</div>
                <div class="info-value">
                    <span id="status-dot" class="status-dot offline"></span>
                    <span id="status-text">Offline</span>
                </div>
            </div>
            <div class="info-card">
                <div class="info-title">Pump Status</div>
                <div class="info-value" id="pump-status-text">Standby ⚪</div>
            </div>
        </div>

        <div class="status-bar-container">
            <div class="status-bar-title">Currently Running Zone</div>
            <div class="status-grid" id="status-zone-grid">
                </div>
        </div>

        <div class="zone-bar-container">
            <div class="zone-bar-title">
                <span>Direct Manual Control</span>
                <span style="font-size: 12px; font-weight: normal; color: var(--text-light);">Tap to toggle</span>
            </div>
            <div class="zone-grid" id="manual-zone-grid">
                </div>
        </div>

        <button class="nav-btn" onclick="openSchedulingPage()">⚙️ Manage Irrigation Schedules</button>
    </div>

    <div id="scheduling-page" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="openDashboardPage()">&#8592; Back</button>
            <h1>📅 Setup Schedules</h1>
        </div>

        <div class="section-title">
            Your Schedules
            <button class="action-btn" onclick="showAddForm()">+ Add Schedule</button>
        </div>

        <div id="add-schedule-form" class="schedule-form-card hidden">
            <h3 style="margin-top:0; color:var(--primary-dark)">Create New Schedule</h3>
            
            <div class="form-group">
                <label>Select Zone</label>
                <select id="input-zone" class="form-control">
                    <option value="1">Zone 1</option><option value="2">Zone 2</option>
                    <option value="3">Zone 3</option><option value="4">Zone 4</option>
                    <option value="5">Zone 5</option><option value="6">Zone 6</option>
                    <option value="7">Zone 7</option><option value="8">Zone 8</option>
                    <option value="9">Zone 9</option><option value="10">Zone 10</option>
                    <option value="11">Zone 11</option><option value="12">Zone 12</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Start Time</label>
                    <input type="time" id="input-time" class="form-control" value="06:00">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Duration (Mins)</label>
                    <input type="number" id="input-duration" class="form-control" placeholder="15" value="15">
                </div>
            </div>

            <button class="save-btn" onclick="saveNewSchedule()">Save Schedule to Cloud</button>
            <button class="cancel-btn" onclick="hideAddForm()">Cancel</button>
        </div>

        <div id="saved-schedules-list"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. FIREBASE INITIALIZATION
    const firebaseConfig = {
        apiKey: "AIzaSyAbfqRl4T3cv6cjZz9wT9J9cOjOenp-UJY",
        authDomain: "smart-irrigation-c039f.firebaseapp.com",
        databaseURL: "https://smart-irrigation-c039f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-irrigation-c039f",
        storageBucket: "smart-irrigation-c039f.firebasestorage.app",
        messagingSenderId: "322853251796",
        appId: "1:322853251796:web:881979f2aa261bb0b4a941",
        measurementId: "G-3T9E62SHQJ"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. UI NAVIGATION
    function openSchedulingPage() {
        document.getElementById('dashboard-page').classList.add('hidden');
        document.getElementById('scheduling-page').classList.remove('hidden');
    }
    function openDashboardPage() {
        document.getElementById('scheduling-page').classList.add('hidden');
        document.getElementById('dashboard-page').classList.remove('hidden');
    }
    function showAddForm() { document.getElementById('add-schedule-form').classList.remove('hidden'); }
    function hideAddForm() { document.getElementById('add-schedule-form').classList.add('hidden'); }

    // 3. GENERATE VISUAL STATUS BAR & MANUAL BUTTONS
    const statusGrid = document.getElementById('status-zone-grid');
    const manualGrid = document.getElementById('manual-zone-grid');
    
    for(let i = 1; i <= 12; i++) {
        // Visual indicators (1-12)
        statusGrid.innerHTML += `<div id="indicator-${i}" class="zone-indicator">${i}</div>`;
        // Manual Toggle Buttons
        manualGrid.innerHTML += `<button id="btn-zone-${i}" class="zone-btn" onclick="toggleZone(${i})">Zone ${i}</button>`;
    }

    function toggleZone(zone) {
        const btn = document.getElementById(`btn-zone-${zone}`);
        const isCurrentlyOn = btn.classList.contains('active');
        database.ref('zone' + zone).update({ manual: isCurrentlyOn ? 0 : 1 });
    }

    // Listen to Firebase for Manual Button states
    for(let i = 1; i <= 12; i++) {
        database.ref('zone' + i + '/manual').on('value', (snapshot) => {
            const btn = document.getElementById(`btn-zone-${i}`);
            if(snapshot.val() === 1) {
                btn.classList.add('active');
                btn.innerText = `Zone ${i} (ON)`;
            } else {
                btn.classList.remove('active');
                btn.innerText = `Zone ${i}`;
            }
        });
    }

    // NEW: Listen for the TRUE Active Zone (Schedule or Manual)
    database.ref('system/activeZone').on('value', (snapshot) => {
        if(snapshot.exists()) {
            const activeZone = snapshot.val(); // e.g., 1, 2, or 0 for none
            
            // First, remove green highlighting from all indicators
            for(let i = 1; i <= 12; i++) {
                document.getElementById(`indicator-${i}`).classList.remove('running');
            }
            // Add green highlight to the one actually running
            if(activeZone > 0 && activeZone <= 12) {
                document.getElementById(`indicator-${activeZone}`).classList.add('running');
            }
        }
    });

    // 4. SEND SCHEDULE TO FIREBASE
    function saveNewSchedule() {
        const zone = document.getElementById('input-zone').value;
        const timeStr = document.getElementById('input-time').value; 
        const durationMins = parseInt(document.getElementById('input-duration').value);

        const timeParts = timeStr.split(':');
        const hours = parseInt(timeParts[0]);
        const minutes = parseInt(timeParts[1]);
        const startSeconds = (hours * 3600) + (minutes * 60);
        const stopSeconds = startSeconds + (durationMins * 60);

        database.ref('zone' + zone).update({
            start: startSeconds,
            stop: stopSeconds
        }).then(() => {
            const cardHTML = `
                <div class="saved-schedule-card">
                    <div class="schedule-details">
                        <span class="schedule-zone">Zone ${zone}</span>
                        <span class="schedule-time">⏱️ Start: ${timeStr} | Duration: ${durationMins} mins</span>
                    </div>
                    <button class="delete-btn" onclick="deleteSchedule(${zone}, this)">Clear</button>
                </div>
            `;
            document.getElementById('saved-schedules-list').insertAdjacentHTML('beforeend', cardHTML);
            hideAddForm();
        }).catch((error) => {
            alert("Error saving to cloud: " + error);
        });
    }

    function deleteSchedule(zone, buttonElement) {
        database.ref('zone' + zone).update({ start: 0, stop: 0 }).then(() => {
            buttonElement.parentElement.remove();
        });
    }

    // 5. STRICT HEARTBEAT LOGIC
    let lastEsp32Heartbeat = 0; 

    database.ref('system/heartbeat').on('value', (snapshot) => {
        if (snapshot.exists()) {
            lastEsp32Heartbeat = snapshot.val(); 
        }
    });

    database.ref('system/pumpState').on('value', (snapshot) => {
        if (snapshot.exists()) {
            const pumpStatusText = document.getElementById('pump-status-text');
            if (snapshot.val() === 1) {
                pumpStatusText.innerHTML = "<span style='color: var(--success)'>Running 🟢</span>";
            } else {
                pumpStatusText.innerHTML = "Standby ⚪";
            }
        }
    });

    function checkSystemStatus() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const currentUnix = Math.floor(Date.now() / 1000);
        
        if (lastEsp32Heartbeat > 0 && (currentUnix - lastEsp32Heartbeat) < 15) {
            dot.className = "status-dot online";
            text.innerText = "Online";
        } else {
            dot.className = "status-dot offline";
            text.innerText = "Offline";
        }
    }

    setInterval(checkSystemStatus, 2000);
</script>
</body>
</html>
